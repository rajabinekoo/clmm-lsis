services:
  postgres:
    image: postgres:16-alpine
    container_name: clmm-lsis-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: clmm_lsis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d clmm_lsis
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: